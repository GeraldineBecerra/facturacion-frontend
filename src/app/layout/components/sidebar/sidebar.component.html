<aside class="fixed top-16 left-0 h-[calc(100vh-64px)] border-r border-slate-200/70 bg-white transition-all duration-300"
  [class.w-64]="!collapsed" [class.w-20]="collapsed">
  <div class="flex flex-col h-full p-4">
    <div class="mb-6 px-2">
      @if (!collapsed) {
        <p class="text-[11px] uppercase tracking-[0.12em] text-slate-500">Navegacion</p>
      }
    </div>

    <nav class="flex flex-col gap-2 flex-1">
      <a routerLink="/usuarios" routerLinkActive="bg-slate-100 text-blue-600"
        class="h-10 px-3 rounded-xl flex items-center gap-3 text-sm text-slate-600 hover:bg-slate-100 transition-colors">
        <lucide-icon [img]="Users" class="w-4 h-4 shrink-0"></lucide-icon>
        @if (!collapsed) { <span>Usuarios</span> }
      </a>

      <a routerLink="/empresas" routerLinkActive="bg-slate-100 text-blue-600"
        class="h-10 px-3 rounded-xl flex items-center gap-3 text-sm text-slate-600 hover:bg-slate-100 transition-colors">
        <lucide-icon [img]="Building2" class="w-4 h-4 shrink-0"></lucide-icon>
        @if (!collapsed) { <span>Empresas</span> }
      </a>

      <a routerLink="/clientes" routerLinkActive="bg-slate-100 text-blue-600"
        class="h-10 px-3 rounded-xl flex items-center gap-3 text-sm text-slate-600 hover:bg-slate-100 transition-colors">
        <lucide-icon [img]="Users" class="w-4 h-4 shrink-0"></lucide-icon>
        @if (!collapsed) { <span>Clientes</span> }
      </a>

      <a routerLink="/facturacion" routerLinkActive="bg-slate-100 text-blue-600"
        class="h-10 px-3 rounded-xl flex items-center gap-3 text-sm text-slate-600 hover:bg-slate-100 transition-colors">
        <lucide-icon [img]="FileBarChart2" class="w-4 h-4 shrink-0"></lucide-icon>
        @if (!collapsed) { <span>Facturación</span> }
      </a>

      <button
        class="h-10 px-3 rounded-xl flex items-center gap-3 text-sm text-slate-500 hover:bg-slate-100 transition-colors">
        <lucide-icon [img]="LayoutGrid" class="w-4 h-4 shrink-0"></lucide-icon>
        @if (!collapsed) { <span>Dashboard</span> }
      </button>
    </nav>

    <div class="border-t border-slate-200/70 pt-4 space-y-2">
      <button
        class="w-full h-10 px-3 rounded-xl bg-blue-600 text-white text-sm font-semibold hover:bg-blue-700 transition-colors flex items-center justify-center gap-2">
        <lucide-icon [img]="FileBarChart2" class="w-4 h-4"></lucide-icon>
        @if (!collapsed) { <span>Reporte</span> }
      </button>

      <button
        class="w-full h-10 px-3 rounded-xl text-slate-600 hover:bg-slate-100 transition-colors flex items-center gap-2">
        <lucide-icon [img]="Settings" class="w-4 h-4"></lucide-icon>
        @if (!collapsed) { <span>Configuracion</span> }
      </button>
    </div>
  </div>
</aside>
