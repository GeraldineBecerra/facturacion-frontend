<main class="lg:ml-64 pt-10 px-5 pb-12 min-h-screen bg-surface text-on-surface">

  <div class="max-w-[1400px] mx-auto">

    <!-- Header -->
    <div class="mb-10">

      <h1 class="text-4xl font-extrabold tracking-tight mb-2">
        Crear Nuevo Usuario
      </h1>

      <p class="text-on-surface-variant max-w-2xl">
        Complete la información técnica del usuario para habilitar el acceso
        a los módulos de la plataforma.
      </p>

    </div>


    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">

      <!-- FORM -->
      <div class="lg:col-span-8">

        <div class="card">

          <form (ngSubmit)="saveUser()" class="space-y-8">

            <!-- Identity -->
            <section>

              <div class="section-header">

                <span class="icon-box">
                  <span class="material-symbols-outlined">badge</span>
                </span>

                <h3 class="section-title">
                  Identidad de Acceso
                </h3>

              </div>

              <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                <!-- Username -->
                <div class="form-field">

                  <label>Nombre de Usuario</label>

                  <input
                    type="text"
                    [(ngModel)]="user.username"
                    name="username"
                    placeholder="ej. j.perez"
                    class="input"/>

                </div>


                <!-- Empresa -->
                <div class="form-field">

                  <label>Empresa</label>

                  <input
                    value="Cobalt Nexus Holding S.A."
                    readonly
                    class="input-disabled"/>

                </div>


                <!-- Password -->
                <div class="form-field md:col-span-2">

                  <label>Contraseña Temporal</label>

                  <div class="relative">

                    <input
                      [type]="showPassword ? 'text' : 'password'"
                      [(ngModel)]="user.password"
                      name="password"
                      placeholder="••••••••••"
                      class="input"/>

                    <button
                      type="button"
                      (click)="togglePassword()"
                      class="password-toggle">

                      <span class="material-symbols-outlined">
                        {{ showPassword ? 'visibility_off' : 'visibility' }}
                      </span>

                    </button>

                  </div>

                </div>

              </div>

            </section>


            <div class="divider"></div>


            <!-- Roles -->
            <section>

              <div class="section-header">

                <span class="icon-box">
                  <span class="material-symbols-outlined">manage_accounts</span>
                </span>

                <h3 class="section-title">
                  Privilegios y Estado
                </h3>

              </div>


              <div class="grid grid-cols-1 md:grid-cols-2 gap-8">

                <!-- Rol -->
                <div class="form-field">

                  <label>Rol Asignado</label>

                  <select
                    [(ngModel)]="user.role"
                    name="role"
                    class="input">

                    <option value="">Seleccione un rol...</option>
                    <option value="admin">Administrador</option>
                    <option value="billing">Facturación</option>
                    <option value="viewer">Auditor</option>

                  </select>

                </div>


                <!-- Active -->
                <div class="form-field">

                  <label class="mb-4">Estado de Cuenta</label>

                  <div class="toggle-box">

                    <div class="flex flex-col">
                      <span class="text-sm font-bold">
                        Usuario Activo
                      </span>

                      <span class="text-xs text-on-surface-variant">
                        Habilitar acceso inmediato
                      </span>
                    </div>

                    <input
                      type="checkbox"
                      [(ngModel)]="user.active"
                      name="active"/>

                  </div>

                </div>

              </div>

            </section>


            <!-- Buttons -->
            <div class="actions">

              <button type="button" class="btn-cancel">
                Cancelar
              </button>

              <button type="submit" class="btn-primary">
                Guardar Usuario
              </button>

            </div>


          </form>

        </div>

      </div>

    </div>

  </div>

</main>
