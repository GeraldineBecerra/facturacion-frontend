<div class="customers-page">
  <app-page-header
    headerTitle="Gestión de Clientes"
    subtitle="Administra y organiza el portafolio de clientes."
    buttonLabel="Nuevo Cliente"
    (buttonClick)="createCustomer()"
  />

  <section class="filters">
    <ui-input
      name="search"
      label="Buscar cliente"
      placeholder="RUT, razón social o nombre corto"
      [(ngModel)]="filters.search"
    />

    <div class="select-field">
      <label for="tipo">Estado</label>
      <select id="tipo" name="tipo" [(ngModel)]="filters.status">
        <option value="">Todos</option>
        <option value="true">Activos</option>
        <option value="false">Inactivos</option>
      </select>
    </div>

    <div class="filter-actions">
      <ui-button variant="secondary" (clicked)="clearFilters()">Limpiar</ui-button>
      <ui-button (clicked)="search()">Filtrar</ui-button>
    </div>
  </section>

  <section class="table-card">
    <div class="table-heading">
      <div>
        <h2>Clientes registrados</h2>
        <p>{{ filteredCustomers.length }} clientes encontrados</p>
      </div>
    </div>

    <app-table
      [columns]="columns"
      [data]="filteredCustomers"
      [actions]="actions"
      [isLoading]="isLoading"
      [error]="error"
      [totalItems]="filteredCustomers.length"
      (retry)="loadCustomers()"
    />
  </section>

  <section class="metrics">
    <article>
      <span>Nuevos este mes</span>
      <strong>{{ newCustomersThisMonth }}</strong>
    </article>
    <article>
      <span>Clientes activos</span>
      <strong>{{ activeCustomers }}</strong>
    </article>
    <article>
      <span>Actividad reciente (24 h)</span>
      <strong>{{ recentCustomerActivity }}</strong>
    </article>
  </section>
</div>
