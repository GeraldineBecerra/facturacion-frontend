@if (totalPages > 1) {
<div class="bg-gray-50 px-4 py-3 rounded-xl border border-gray-200 flex items-center justify-between">


  <!-- Info de resultados -->
  <div class="text-sm text-gray-700">
    Mostrando
    <span class="font-medium">{{ startItem }}</span>
    a
    <span class="font-medium">{{ endItem }}</span>
    de
    <span class="font-medium">{{ totalItems }}</span>
    resultados
  </div>


  <!-- Controles -->
  <div class="flex gap-2">


    <!-- Anterior -->
    <button
      type="button"
      (click)="prevPage()"
      [disabled]="currentPage === 1"
      class="px-3 py-1 rounded-lg border border-gray-300 text-sm font-medium
             disabled:opacity-50 disabled:cursor-not-allowed hover:bg-white transition-colors"
    >
      Anterior
    </button>


    <!-- Páginas -->
    @for (page of pages; track page) {
      <button
        type="button"
        (click)="goToPage(page)"
        class="px-3 py-1 rounded-lg border border-gray-300 text-sm font-medium hover:bg-white transition-colors"
        [class.bg-blue-600]="currentPage === page"
        [class.text-white]="currentPage === page"
        [class.border-blue-600]="currentPage === page"
      >
        {{ page }}
      </button>
    }


    <!-- Siguiente -->
    <button
      type="button"
      (click)="nextPage()"
      [disabled]="currentPage === totalPages"
      class="px-3 py-1 rounded-lg border border-gray-300 text-sm font-medium
             disabled:opacity-50 disabled:cursor-not-allowed hover:bg-white transition-colors"
    >
      Siguiente
    </button>


  </div>
</div>
}
